spring.application.name=restorano-backend
server.port=8080

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5434/restorano
spring.datasource.username=restorano
spring.datasource.password=restorano
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=restorano
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=restorano
spring.flyway.default-schema=restorano

# Jackson — serialize Instant as ISO 8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
app.jwt.secret=+1b/47ihQx96lG3Tu0r0TzDWZcTLuvgjyMe+YfCK5Lc=
app.jwt.expirationMs=86400000

# SpringDoc OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=health,info
