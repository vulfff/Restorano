services:
  postgres:
    image: postgres:16-alpine
    container_name: restorano-db
    environment:
      POSTGRES_USER: restorano
      POSTGRES_PASSWORD: restorano
      POSTGRES_DB: restorano
    ports:
      - "5434:5432"
    volumes:
      - restorano-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restorano"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: restorano-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restorano
      SPRING_DATASOURCE_USERNAME: restorano
      SPRING_DATASOURCE_PASSWORD: restorano
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./backend/src
        - action: rebuild
          path: ./backend/pom.xml
        - action: rebuild
          path: ./backend/Dockerfile

volumes:
  restorano-data:
